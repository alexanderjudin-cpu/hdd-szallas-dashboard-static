document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<!-- ================================================================= -->\n<!-- SUPABASE LIVE LOADER  (UAHUN / housing)                           -->\n<!-- A bundler <script> ELÉ kerül a <head>-ben. Feltölti a window.DASH-t -->\n<!-- Supabase REST-ből és ~12 mp-enként frissít (polling).             -->\n<!-- ================================================================= -->\n<script>\n(function () {\n  /* ========================== KONFIG ============================== */\n  const SUPABASE_URL = \"https://qyteyqhtatuuiqcwdtvf.supabase.co\"; // a te projekted URL-je\n  // Az ÚJ \"Publishable\" kulcs (sb_publishable_...). Böngészőbe való, megosztható.\n  // A teljes kulcsot az API Keys oldalon a másolás ikonnal másold ki.\n  const SUPABASE_KEY = \"sb_publishable_tD4bCmJCzQTOLjcdpJY8cQ_KUy1PIRu\"; // <-- ide a teljes sb_publishable_ kulcs\n  const POLL_MS      = 12000;                              // frissítés (0 = csak betöltéskor)\n\n  // A megye-GeoJSON nincs a bundle-ben. Tedd elérhető URL-re (pl. Supabase Storage publikus link).\n  // A feature-ök properties-ében a megyenév: megye / m / name mezők egyike.\n  const GEO_URL = \"https://raw.githubusercontent.com/ColorfulCoding/hungary-geojson/master/counties.geojson\";\n\n  // Forrás viewk a Supabase-ben (a Retool app alapján).\n  const VIEWS = {\n    megye:   \"v_megye\",          // régió + megye nézet  (select * from v_megye)\n    partner: \"v_megye_partner\",  // partner bontás       (select * from v_megye_partner)\n    occ:     \"v_housing_occupancy_dashboard\" // a housing sémában; lásd SCHEMA lent\n  };\n  // A housing.v_housing_occupancy_dashboard a \"housing\" sémában van. A PostgREST\n  // alapból csak a \"public\" sémát éri el. Két lehetőség:\n  //  (A) készíts public wrappert:  create view public.v_housing_occupancy_dashboard as\n  //        select * from housing.v_housing_occupancy_dashboard;  (EZ AZ EGYSZERŰBB)\n  //  (B) tedd elérhetővé a \"housing\" sémát a PostgREST exposed schemas közé,\n  //      majd a fetch headerhez add:  \"Accept-Profile\": \"housing\".\n  const OCC_SCHEMA = \"public\"; // ha (B)-t választod: \"housing\"\n\n  /* ================ MEZŐ-LEKÉPEZÉS (v_megye / v_megye_partner) ======\n     A v_megye / v_megye_partner pontos oszlopnevei az exportból nem\n     derültek ki (select * volt). Futtasd le:\n         select * from v_megye limit 1;\n         select * from v_megye_partner limit 1;\n     és írd át az alábbi jobb oldali értékeket a TÉNYLEGES oszlopnevekre.\n     A dashboard ezeket a kulcsokat várja: regio, megye, munkavallalok,\n     ejszakak, koltseg (+ partner/ceg a bontásokhoz).                  */\n  const MAP_MEGYE = {\n    regio:         \"regio\",         // régió neve\n    megye:         \"megye\",         // megye neve (a GeoJSON-nal ez párosít!)\n    munkavallalok: \"munkavallalok\", // fő\n    ejszakak:      \"ejszakak\",      // vendégéjszaka\n    koltseg:       \"koltseg\"        // időszaki költség\n  };\n  const MAP_PARTNER = {\n    partner:       \"partner\",       // partner megnevezése\n    megye:         \"megye\",\n    munkavallalok: \"munkavallalok\",\n    ejszakak:      \"ejszakak\",\n    koltseg:       \"koltseg\"\n  };\n  // A v_megye nem tartalmaz cég-mezőt, ezért a \"Cég\" nézethez a partner-bontásból\n  // csoportosítunk. Ha van önálló cég-view (pl. v_megye_ceg), írd ide a nevét és a\n  // mezőt, akkor azt használja a \"Cég\" nézet; egyébként hagyd üresen (\"\").\n  const CEG_VIEW  = \"\";       // pl. \"v_megye_ceg\" — ha van; egyébként \"\"\n  const CEG_FIELD = \"ceg\";    // a cég mező neve a CEG_VIEW-ban\n  /* ================================================================ */\n\n  const baseHeaders = { apikey: SUPABASE_KEY, Authorization: \"Bearer \" + SUPABASE_KEY };\n  const num = v => { const n = Number(v); return isFinite(n) ? n : 0; };\n  const root = SUPABASE_URL.replace(/\\/$/, \"\");\n\n  async function sb(view, schema) {\n    const h = Object.assign({}, baseHeaders);\n    if (schema && schema !== \"public\") h[\"Accept-Profile\"] = schema;\n    const res = await fetch(root + \"/rest/v1/\" + view + \"?select=*\", { headers: h });\n    if (!res.ok) throw new Error(view + \" → \" + res.status + \" \" + (await res.text()).slice(0, 300));\n    return res.json();\n  }\n\n  // v_megye / v_megye_partner sor -> dashboard-séma a MAP alapján\n  function mapRow(row, M, extra) {\n    const o = {\n      regio:         row[M.regio],\n      megye:         row[M.megye],\n      munkavallalok: num(row[M.munkavallalok]),\n      ejszakak:      num(row[M.ejszakak]),\n      koltseg:       num(row[M.koltseg])\n    };\n    if (extra) extra(o, row);\n    return o;\n  }\n\n  // occupancy sor -> a dashboard OCC_FIX sémája (csak fix díjas szállások)\n  const FIX_LABEL = { fixed_monthly: \"Fix havi\", fixed_daily: \"Fix napi\" };\n  function shapeOcc(rows) {\n    return rows\n      .filter(r => r.ar_tipus === \"fixed_monthly\" || r.ar_tipus === \"fixed_daily\")\n      .map(r => {\n        const capacity = num(r.ferohely);\n        const current  = num(r.aktualis_lakok);\n        const free     = (r.szabad_hely != null) ? num(r.szabad_hely) : Math.max(0, capacity - current);\n        // fix díjas időszaki költség: nettó ár (rezsivel ha van) × kapacitás-időszak.\n        // A view soronkénti netto_ar-t ad; a teljes szállás fix terhe = netto_ar.\n        const unit = (r.netto_ar_rezsivel != null) ? num(r.netto_ar_rezsivel) : num(r.netto_ar);\n        // fix havi/napi díj jellemzően a teljes szállásra szól -> period_cost = unit.\n        const period_cost = unit;\n        const slot_cost = capacity > 0 ? period_cost / capacity : 0;\n        const lost_cost = Math.round(slot_cost * free);\n        const util = (r.kihasznaltsag_szazalek != null)\n          ? num(r.kihasznaltsag_szazalek) / 100\n          : (capacity > 0 ? current / capacity : 0);\n        const util_pct = Math.round(util * 100);\n        let st = r.toltottseg_statusz;\n        if (!st) {\n          if (util >= 1) st = \"Telített\";\n          else if (util >= 0.85) st = \"Rendben\";\n          else if (util >= 0.6) st = \"Figyelendő\";\n          else st = \"Magas veszteség\";\n        }\n        return {\n          address: r.szallas_cim || \"\",\n          provider: r.szallasado || \"\",\n          company: r.ceg || \"\",\n          fixed_type: FIX_LABEL[r.ar_tipus] || r.ar_tipus_label || \"Fix\",\n          capacity, current, free, util_pct,\n          period_cost: Math.round(period_cost),\n          lost_cost,\n          slot_cost: Math.round(slot_cost),\n          state: st\n        };\n      });\n  }\n\n  function summarize(occ) {\n    const cap = occ.reduce((a, r) => a + r.capacity, 0);\n    const cur = occ.reduce((a, r) => a + r.current, 0);\n    return {\n      address_count:   occ.length,\n      capacity_total:  cap,\n      current_total:   cur,\n      free_total:      occ.reduce((a, r) => a + r.free, 0),\n      lost_cost_total: occ.reduce((a, r) => a + r.lost_cost, 0),\n      period_cost_total: occ.reduce((a, r) => a + r.period_cost, 0),\n      critical_count:  occ.filter(r => r.capacity > 0 && r.current / r.capacity < 0.6).length,\n      util_avg:        cap > 0 ? cur / cap : 0\n    };\n  }\n\n  async function buildDash() {\n    const tasks = [\n      sb(VIEWS.megye),\n      sb(VIEWS.partner),\n      sb(VIEWS.occ, OCC_SCHEMA),\n      fetch(GEO_URL, { cache: \"force-cache\" }).then(r => r.json())\n    ];\n    if (CEG_VIEW) tasks.push(sb(CEG_VIEW));\n    const [megyeRaw, partnerRaw, occRaw, geo, cegRaw] = await Promise.all(tasks);\n\n    const megye = megyeRaw.map(r => mapRow(r, MAP_MEGYE));\n\n    const partner = partnerRaw.map(r => {\n      const o = mapRow(r, MAP_PARTNER);\n      o.partner = r[MAP_PARTNER.partner] || \"Nincs adat\";\n      return o;\n    });\n\n    // \"Cég\" nézet: ha van önálló cég-view, abból; egyébként a partner-bontásból\n    // (a partner mezőt kezeljük \"cég\"-ként, hogy a nézet ne legyen üres).\n    let ceg;\n    if (CEG_VIEW && Array.isArray(cegRaw)) {\n      ceg = cegRaw.map(r => {\n        const o = mapRow(r, MAP_MEGYE);\n        o.ceg = r[CEG_FIELD] || \"Nincs adat\";\n        return o;\n      });\n    } else {\n      ceg = partner.map(r => ({\n        ceg: r.partner || \"Nincs adat\",\n        megye: r.megye,\n        munkavallalok: r.munkavallalok,\n        ejszakak: r.ejszakak,\n        koltseg: r.koltseg\n      }));\n    }\n\n    const OCC_FIX = shapeOcc(occRaw);\n    return { EMBEDDED: { megye, ceg, partner }, GEO: geo, OCC_FIX, OCC_SUMMARY: summarize(OCC_FIX) };\n  }\n\n  async function refresh(first) {\n    try {\n      const dash = await buildDash();\n      window.DASH = dash;\n      if (!first && typeof window.__onDashUpdate === \"function\") window.__onDashUpdate();\n    } catch (e) {\n      console.error(\"[DASH loader]\", e);\n      if (first && !window.DASH) {\n        const show = () => {\n          const d = document.createElement(\"div\");\n          d.style.cssText = \"position:fixed;left:12px;bottom:12px;z-index:99999;background:#2a1215;color:#ff8a80;font:12px/1.4 ui-monospace,monospace;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;max-width:90vw;white-space:pre-wrap\";\n          d.textContent = \"[DASH loader] \" + e.message;\n          (document.body || document.documentElement).appendChild(d);\n        };\n        if (document.body) show(); else document.addEventListener(\"DOMContentLoaded\", show);\n      }\n    }\n  }\n\n  refresh(true);\n  if (POLL_MS > 0) setInterval(() => refresh(false), POLL_MS);\n})();\n<\/script>\n<!-- ================ SUPABASE LIVE LOADER VÉGE ====================== -->\n\n<script src=\"df50d762-eb79-4f7f-bc1d-9cb1f0d26716\"><\/script>\n</head>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<s size:15px;color:${C.orange};flex:none\">${fmt(r.lost_cost,'money')}</div></div>`).join(''); }\n\n    // ---- zoom / pan\n    function defaultPanForZoom(z){ return {x:(1-z)*W/2,y:(1-z)*H/2}; }\n    function resetZoom(){ state.zoom=1.08; const p=defaultPanForZoom(state.zoom); state.panX=p.x; state.panY=p.y; applyTransform(); }\n    function applyTransform(){ const vp=$('viewport'); if(vp) vp.setAttribute('transform',`translate(${state.panX.toFixed(2)} ${state.panY.toFixed(2)}) scale(${state.zoom.toFixed(3)})`); }\n    function zoomAt(f,cx=W/2,cy=H/2){ const prev=state.zoom,next=Math.max(1,Math.min(4,prev*f)),s=next/prev; state.panX=cx-s*(cx-state.panX); state.panY=cy-s*(cy-state.panY); state.zoom=next; applyTransform(); }\n    function attachInteraction(){ const svg=$('map'); if(svg.dataset.bound) return; svg.dataset.bound='1'; let dragging=false,lx=0,ly=0; svg.addEventListener('wheel',e=>{ e.preventDefault(); const rect=svg.getBoundingClientRect(); const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height); zoomAt(e.deltaY<0?1.12:0.89,mx,my); },{passive:false}); svg.addEventListener('mousedown',e=>{ dragging=true; lx=e.clientX; ly=e.clientY; svg.style.cursor='grabbing'; }); window.addEventListener('mousemove',e=>{ if(!dragging) return; const rect=svg.getBoundingClientRect(); state.panX+=(e.clientX-lx)*(W/rect.width); state.panY+=(e.clientY-ly)*(H/rect.height); lx=e.clientX; ly=e.clientY; applyTransform(); }); window.addEventListener('mouseup',()=>{ dragging=false; svg.style.cursor='grab'; }); svg.addEventListener('dblclick',()=>resetZoom()); const zi=$('zoomIn'),zo=$('zoomOut'),zr=$('zoomReset'); if(zi)zi.onclick=()=>zoomAt(1.15); if(zo)zo.onclick=()=>zoomAt(0.87); if(zr)zr.onclick=()=>resetZoom(); svg.style.cursor='grab'; }\n\n    // ---- toggles / sync\n    function styleSeg(btns,isOn){ btns.forEach(b=>{ const on=isOn(b); b._on=on; b._restbg=on?'#ffffff':'transparent'; b.style.background=b._restbg; b.style.color=on?'#16191d':'#6b7280'; b.style.boxShadow=on?'0 1px 2px rgba(16,24,40,.14)':'none'; b.style.fontWeight=on?'700':'600'; }); }\n    function stylePill(btns,isOn){ btns.forEach(b=>{ const on=isOn(b); b._on=on; b._restbg=on?C.orangeSoft:'#ffffff'; b.style.background=b._restbg; b.style.color=on?C.orange:'#6b7280'; b.style.borderColor=on?'rgba(238,124,48,.45)':'#e6e8ec'; }); }\n    function addHover(btns){ btns.forEach(b=>{ b.addEventListener('mouseenter',()=>{ if(!b._on){ b.style.color='#374151'; b.style.background='#eef0f3'; } }); b.addEventListener('mouseleave',()=>{ if(!b._on){ b.style.color='#6b7280'; b.style.background=b._restbg||'transparent'; } }); }); }\n\n    function syncPanels(){ const occ=state.view==='occupancy'; $('mapPanel').style.display=occ?'none':'flex'; $('occPanel').style.display=occ?'flex':'none'; $('metricGroup').style.display=occ?'none':'flex'; $('dimrow').style.display=occ?'none':'flex'; $('mapIconBar').style.display=occ?'none':'flex'; $('defaultSidebar').style.display=occ?'none':'flex'; $('occSidebar').style.display=occ?'flex':'none'; $('mainKicker').textContent=occ?'Tőkehatékonyság · Fix díjas portfólió':'Földrajzi eloszlás · '+viewLabel(state.view); $('mainTitle').textContent=occ?'Kihasználtság & becsült bukás':'Magyarország — megyei bontás'; $('mainHint').textContent=occ?'Aktuális kapacitás, kihasználtság és a fix költségből eredő becsült veszteség, szálláshelyenként.':'Régió, cég és partner szerinti eloszlás interaktív térképen — görgess a nagyításhoz, húzd a mozgatáshoz.'; stylePill([...document.querySelectorAll('[data-occ-tab]')],b=>b.dataset.occTab===state.occTab); $('occSummary').style.display=occ&&state.occTab==='summary'?'flex':'none'; $('occDetails').style.display=occ&&state.occTab==='details'?'flex':'none'; }\n\n    function render(){ styleSeg([...document.querySelectorAll('[data-view]')],b=>b.dataset.view===state.view); stylePill([...document.querySelectorAll('[data-metric]')],b=>b.dataset.metric===state.metric); renderControls(); renderKPIs(); syncPanels(); const body=$('mainbody'); body.style.animation='none'; void body.offsetWidth; body.style.animation='riseIn .4s ease'; if(state.view==='occupancy'){ renderOccSidebar(); if(state.occTab==='summary') renderOccSummary(); else renderOccDetails(); } else { renderRank(); renderMap(); } }\n\n    // ---- init\n    $('map').setAttribute('viewBox','0 0 760 520'); $('map').setAttribute('preserveAspectRatio','xMidYMid meet');\n    $('lossChart').setAttribute('viewBox','0 0 760 360'); $('lossChart').setAttribute('preserveAspectRatio','none');\n    $('emptyChart').setAttribute('viewBox','0 0 760 300'); $('emptyChart').setAttribute('preserveAspectRatio','none');\n    [...document.querySelectorAll('[data-view]')].forEach(b=>b.onclick=()=>{ state.view=b.dataset.view; state.dim='__ALL__'; render(); });\n    [...document.querySelectorAll('[data-metric]')].forEach(b=>b.onclick=()=>{ state.metric=b.dataset.metric; render(); });\n    [...document.querySelectorAll('[data-occ-tab]')].forEach(b=>b.onclick=()=>{ state.occTab=b.dataset.occTab; render(); });\n    addHover([...document.querySelectorAll('[data-view]')]); addHover([...document.querySelectorAll('[data-metric]')]); addHover([...document.querySelectorAll('[data-occ-tab]')]);\n    const tick=()=>{ const c=$('clock'); if(!c) return; const d=new Date(); c.textContent=d.toLocaleDateString('hu-HU',{year:'numeric',month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('hu-HU',{hour:'2-digit',minute:'2-digit'}); };\n    tick(); setInterval(tick,30000);\n    window.__onDashUpdate = () => { ({EMBEDDED, GEO, OCC_FIX, OCC_SUMMARY} = window.DASH); DATA = EMBEDDED; render(); };\n    resetZoom(); render();\n  }\n}\n<\/script>\n\n\n</body></html>"
