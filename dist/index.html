document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

003csection style=\"background:#fff;border:1px solid #e6e8ec;border-radius:16px;box-shadow:0 1px 3px rgba(16,24,40,.05);padding:16px 16px 14px;display:flex;flex-direction:column;min-height:0;position:relative;overflow:hidden\">\n      \u003cdiv style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:13px;flex:none\">\n        \u003cdiv>\n          \u003cdiv id=\"mainKicker\" style=\"font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#9aa1ab;font-weight:700;margin-bottom:6px\">\u003c/div>\n          \u003ch2 id=\"mainTitle\" style=\"margin:0;font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.1\">\u003c/h2>\n          \u003cdiv id=\"mainHint\" style=\"font-size:11.5px;color:#6b7280;margin-top:6px;max-width:580px;line-height:1.45\">\u003c/div>\n        \u003c/div>\n        \u003cdiv id=\"mapIconBar\" style=\"display:flex;gap:6px;flex:none\">\n          \u003cbutton id=\"zoomOut\" style=\"width:34px;height:34px;border-radius:9px;border:1px solid #e6e8ec;background:#fff;color:#4b5563;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:.15s\">−\u003c/button>\n          \u003cbutton id=\"zoomReset\" style=\"width:34px;height:34px;border-radius:9px;border:1px solid #e6e8ec;background:#fff;color:#4b5563;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.15s\">⟲\u003c/button>\n          \u003cbutton id=\"zoomIn\" style=\"width:34px;height:34px;border-radius:9px;border:1px solid #e6e8ec;background:#fff;color:#4b5563;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:.15s\">+\u003c/button>\n        \u003c/div>\n      \u003c/div>\n      \u003cdiv id=\"mainbody\" style=\"flex:1;min-height:0;display:flex;flex-direction:column\">\n        \u003cdiv id=\"mapPanel\" style=\"flex:1;min-height:0;display:flex;flex-direction:column;gap:10px\">\n          \u003cdiv style=\"flex:1;min-height:0;border-radius:13px;border:1px solid #eceef1;overflow:hidden;position:relative;background:#fafbfc\">\n            \u003csvg id=\"map\">\u003c/svg>\n            \u003cdiv id=\"tip\" style=\"position:absolute;pointer-events:none;background:#fff;border:1px solid #e6e8ec;border-radius:11px;padding:11px 13px;font-size:12px;opacity:0;transition:.1s;min-width:190px;z-index:9;box-shadow:0 12px 32px rgba(16,24,40,.16);color:#16191d\">\u003c/div>\n          \u003c/div>\n          \u003cdiv id=\"legend\" style=\"display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:10.5px;color:#9aa1ab;padding:2px 2px 0;flex:none\">\u003c/div>\n        \u003c/div>\n        \u003cdiv id=\"occPanel\" style=\"display:none;flex-direction:column;min-height:0;flex:1\">\n          \u003cdiv style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:13px;flex:none\">\n            \u003cdiv style=\"display:flex;gap:6px\">\n              \u003cbutton data-occ-tab=\"summary\" style=\"border:1px solid #e6e8ec;background:#fff;color:#6b7280;font:inherit;font-weight:600;font-size:12px;padding:8px 14px;border-radius:9px;cursor:pointer;transition:.16s\">Vezetői dashboard\u003c/button>\n              \u003cbutton data-occ-tab=\"details\" style=\"border:1px solid #e6e8ec;background:#fff;color:#6b7280;font:inherit;font-weight:600;font-size:12px;padding:8px 14px;border-radius:9px;cursor:pointer;transition:.16s\">Részletes bontás\u003c/button>\n            \u003c/div>\n            \u003cdiv style=\"font-size:11px;color:#6b7280;max-width:430px;text-align:right;line-height:1.45\">Csak \u003cb style=\"color:#16191d\">fix havi\u003c/b> és \u003cb style=\"color:#16191d\">fix napi\u003c/b> díjas szállások. Becsült bukás = fix költség × üres / teljes férőhely.\u003c/div>\n          \u003c/div>\n          \u003cdiv id=\"occSummary\" style=\"display:flex;flex-direction:column;min-height:0;flex:1\">\n            \u003cdiv id=\"occExecutiveKpis\" style=\"display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; flex: none; background-color: #ffffff\">\u003c/div>\n            \u003cdiv style=\"display:grid;grid-template-columns:1.16fr .84fr;gap:12px;margin-top:12px;min-height:0;flex:1\">\n              \u003cdiv style=\"display:flex;flex-direction:column;gap:12px;min-height:0;overflow:auto;padding-right:2px\">\n                \u003cdiv style=\"background:#fff;border:1px solid #e6e8ec;border-radius:14px;padding:14px;flex:none\">\n                  \u003cdiv style=\"font-size:12.5px;font-weight:700;color:#16191d\">Legnagyobb becsült havi bukás\u003c/div>\n                  \u003cdiv style=\"font-size:11px;color:#6b7280;margin:4px 0 8px\">Pénzügyi veszteség szállásonként az üres férőhelyek alapján.\u003c/div>\n                  \u003csvg id=\"lossChart\" preserveAspectRatio=\"none\" style=\"width: 100%; opacity: 1\">\u003c/svg>\n                \u003c/div>\n                \u003cdiv style=\"background:#fff;border:1px solid #e6e8ec;border-radius:14px;padding:14px;flex:none\">\n                  \u003cdiv style=\"font-size:12.5px;font-weight:700;color:#16191d\">Legtöbb üres, de fizetett férőhely\u003c/div>\n                  \u003cdiv style=\"font-size:11px;color:#6b7280;margin:4px 0 8px\">Kapacitásveszteség szállásonként — hol áll bent a legtöbb pénz.\u003c/div>\n                  \u003csvg id=\"emptyChart\" style=\"height:214px\">\u003c/svg>\n                \u003c/div>\n              \u003c/div>\n              \u003cdiv id=\"criticalList\" style=\"display:flex;flex-direction:column;gap:10px;min-height:0;overflow:auto;padding-right:2px\">\u003c/div>\n            \u003c/div>\n          \u003c/div>\n          \u003cdiv id=\"occDetails\" style=\"display:none;flex-direction:column;min-height:0;flex:1\">\n            \u003cdiv id=\"detailBanner\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex:none;margin-bottom:12px\">\u003c/div>\n            \u003cdiv id=\"detailTableWrap\" style=\"border:1px solid #e6e8ec;border-radius:14px;overflow:auto;min-height:0;flex:1;background:#fff\">\u003c/div>\n          \u003c/div>\n        \u003c/div>\n      \u003c/div>\n    \u003c/section>\n\n    \u003caside style=\"display:flex;flex-direction:column;gap:14px;min-height:0\">\n      \u003cdiv id=\"kpis\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:none\">\u003c/div>\n      \u003cdiv id=\"defaultSidebar\" style=\"display:flex;flex-direction:column;min-height:0;flex:1;gap:9px\">\n        \u003cdiv id=\"rankTitle\" style=\"font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#9aa1ab;font-weight:700;padding-left:2px;flex:none\">\u003c/div>\n        \u003cdiv id=\"rank\" style=\"flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;gap:8px;padding-right:3px\">\u003c/div>\n      \u003c/div>\n      \u003cdiv id=\"occSidebar\" style=\"display:none;flex-direction:column;min-height:0;flex:1;gap:9px\">\n        \u003cdiv style=\"font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#9aa1ab;font-weight:700;padding-left:2px;flex:none\">Legnagyobb veszteség · szálláshelyek\u003c/div>\n        \u003cdiv id=\"occSidebarList\" style=\"flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;gap:8px;padding-right:3px\">\u003c/div>\n      \u003c/div>\n    \u003c/aside>\n\n  \u003c/div>\n\u003c/div>\n\u003c/x-dc>\n\n\u003cscript type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    if(this._init) return; this._init=true;\n    const boot=()=>{ if(window.DASH) this.start(); else requestAnimationFrame(boot); };\n    boot();\n  }\n  start(){\n    let {EMBEDDED, GEO, OCC_FIX, OCC_SUMMARY} = window.DASH;\n    const NS='http://www.w3.org/2000/svg';\n    const W=760,H=520,PAD=20;\n    const C={text:'#16191d',muted:'#6b7280',faint:'#9aa1ab',orange:'#ee7c30',orangeSoft:'#fcecdd',line:'#e6e8ec'};\n    const card='background:#fff;border:1px solid #e6e8ec;border-radius:14px;box-shadow:0 1px 2px rgba(16,24,40,.04);';\n    const micro='font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#9aa1ab;font-weight:700;';\n    const klabel='font-size:11px;color:#6b7280;font-weight:600;';\n    const big=\"font-family:'Hanken Grotesk',system-ui,sans-serif;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;\";\n    const ST={'Magas veszteség':{fg:'#d64545',bg:'#fde8e8'},'Kritikus':{fg:'#d64545',bg:'#fde8e8'},'Figyelendő':{fg:'#8a6d00',bg:'#fbeeb0'},'Rendben':{fg:'#1f9d57',bg:'#d8f5e3'},'Telített':{fg:'#3b6fed',bg:'#e2e9fd'}};\n    function stateStyle(s){ return ST[s]||{fg:'#3b6fed',bg:'#e2e9fd'}; }\n    let DATA=EMBEDDED;\n    const state={view:'regio',metric:'ejszakak',dim:'__ALL__',zoom:1.08,panX:0,panY:0,occTab:'summary'};\n\n    const $=id=>document.getElementById(id);\n    const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/\u003c/g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');\n    function fmt(n,metric){ n=Number(n||0); if(metric==='money'){ if(Math.abs(n)>=1000000) return (n/1000000).toLocaleString('hu-HU',{maximumFractionDigits:1})+' M Ft'; return Math.round(n).toLocaleString('hu-HU')+' Ft'; } return Math.round(n).toLocaleString('hu-HU'); }\n    function pct(n){ return (Number(n||0)*100).toLocaleString('hu-HU',{maximumFractionDigits:1})+'%'; }\n    function fmtNum(v,type){ if(type==='money') return fmt(v,'money'); if(type==='pct1') return v.toLocaleString('hu-HU',{maximumFractionDigits:1})+'%'; return Math.round(v).toLocaleString('hu-HU'); }\n    function metricLabel(m){ return m==='ejszakak'?'Éjszakák':m==='munkavallalok'?'Munkavállalók':'Költség'; }\n    function viewLabel(v){ return v==='regio'?'Régió':v==='ceg'?'Cég':v==='partner'?'Partner':'Kihasználtság'; }\n    function hexToRgb(hex){ const m=hex.replace('#',''); return [parseInt(m.slice(0,2),16),parseInt(m.slice(2,4),16),parseInt(m.slice(4,6),16)]; }\n    function mix(a,b,t){ const A=hexToRgb(a),B=hexToRgb(b); return 'rgb('+A.map((v,i)=>Math.round(v+(B[i]-v)*t)).join(',')+')'; }\n    function fillFor(t){ return mix('#fbe4d2', C.orange, 0.06+Math.max(0,Math.min(1,t))*0.94); }\n\n    // ---- geo projection\n    function getCountyName(f){ return f.properties.megye||f.properties.m||f.properties.name||''; }\n    function allCoords(geom){ const out=[]; (function walk(a){ if(typeof a[0]==='number') out.push(a); else a.forEach(walk); })(geom.coordinates); return out; }\n    const coords=GEO.features.flatMap(f=>allCoords(f.geometry));\n    const minX=Math.min(...coords.map(c=>c[0])),maxX=Math.max(...coords.map(c=>c[0])),minY=Math.min(...coords.map(c=>c[1])),maxY=Math.max(...coords.map(c=>c[1]));\n    const baseScale=Math.min((W-2*PAD)/(maxX-minX),(H-2*PAD)/(maxY-minY));\n    const offX=(W-(maxX-minX)*baseScale)/2,offY=(H-(maxY-minY)*baseScale)/2;\n    function project(c){ return [offX+(c[0]-minX)*baseScale, offY+(maxY-c[1])*baseScale]; }\n    function ringPath(ring){ return ring.map((c,i)=>{ const p=project(c); return (i?'L':'M')+p[0].toFixed(2)+','+p[1].toFixed(2); }).join('')+'Z'; }\n    function geomPath(g){ if(g.type==='Polygon') return g.coordinates.map(ringPath).join(''); if(g.type==='MultiPolygon') return g.coordinates.flatMap(p=>p.map(ringPath)).join(''); return ''; }\n    function centroid(g){ const cs=allCoords(g); const sx=cs.reduce((a,c)=>a+c[0],0)/cs.length, sy=cs.reduce((a,c)=>a+c[1],0)/cs.length; return project([sx,sy]); }\n\n    // ---- data shaping\n    function rowsForMap(){ if(state.view==='regio') return DATA.megye.map(r=>({...r,label:r.regio,megye:r.megye})); const key=state.view==='ceg'?'ceg':'partner'; let rows=DATA[state.view]; if(state.dim!=='__ALL__') rows=rows.filter(r=>r[key]===state.dim); if(state.dim==='__ALL__'){ const by={}; rows.forEach(r=>{ const m=r.megye; if(!by[m]||Number(r[state.metric])>Number(by[m][state.metric])) by[m]=r; }); return Object.values(by).map(r=>({...r,label:r[key]||'Nincs adat'})); } return rows.map(r=>({...r,label:r[key]||'Nincs adat'})); }\n    function groupedRank( cost_total,'money'))+banner('Üres férőhely',fmt(s.free_total)); const rows=OCC_FIX.slice().sort((a,b)=>b.lost_cost-a.lost_cost); const th=(t,r)=>`\u003cth style=\"position:sticky;top:0;background:#f7f8fa;color:#6b7280;text-align:${r?'right':'left'};padding:11px 12px;border-bottom:1px solid ${C.line};font-weight:700;font-size:10px;letter-spacing:.04em;text-transform:uppercase;z-index:1\">${t}\u003c/th>`; const td=(c,r,st)=>`\u003ctd style=\"padding:11px 12px;border-bottom:1px solid #eef0f3;${r?'text-align:right;font-variant-numeric:tabular-nums;font-weight:700;':''}${st||''}\">${c}\u003c/td>`; $('detailTableWrap').innerHTML=`\u003ctable style=\"width:100%;border-collapse:collapse;font-size:12px;color:${C.text}\">\u003cthead>\u003ctr>${th('Cím')}${th('Típus')}${th('Lakó / max',1)}${th('Üres',1)}${th('Kihasználtság',1)}${th('Fix költség',1)}${th('Becsült bukás',1)}${th('1 hely',1)}${th('Állapot')}\u003c/tr>\u003c/thead>\u003ctbody>${rows.map(r=>{ const ss=stateStyle(r.state); return `\u003ctr>${td(`\u003cdiv style=\"font-weight:700\">${esc(r.address)}\u003c/div>\u003cdiv style=\"color:${C.muted};margin-top:3px;font-size:11px\">${esc(r.provider||'Nincs szállásadó')} · ${esc(r.company||'')}\u003c/div>`)}${td(pill(r.fixed_type,'#5b6370','#eef0f3'))}${td(r.current+' / '+r.capacity,1)}${td(r.free,1)}${td(r.util_pct.toLocaleString('hu-HU')+'%',1)}${td(fmt(r.period_cost,'money'),1)}${td(`\u003cspan style=\"color:${C.orange}\">${fmt(r.lost_cost,'money')}\u003c/span>`,1)}${td(fmt(r.slot_cost,'money'),1)}${td(pill(r.state,ss.fg,ss.bg))}\u003c/tr>`; }).join('')}\u003c/tbody>\u003c/table>`; }\n\n    function renderOccSidebar(){ const rows=OCC_FIX.filter(r=>r.free>0).slice().sort((a,b)=>b.lost_cost-a.lost_cost).slice(0,9); $('occSidebarList').innerHTML=rows.map(r=>`\u003cdiv style=\"${card}padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px\">\u003cdiv style=\"min-width:0\">\u003cdiv style=\"font-weight:600;font-size:12px;color:${C.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">${esc(r.address)}\u003c/div>\u003cdiv style=\"font-size:10px;color:${C.muted};margin-top:2px\">${r.fixed_type} · ${r.current}/${r.capacity} fő · ${r.free} üres\u003c/div>\u003c/div>\u003cdiv style=\"${big}font-size:15px;color:${C.orange};flex:none\">${fmt(r.lost_cost,'money')}\u003c/div>\u003c/div>`).join(''); }\n\n    // ---- zoom / pan\n    function defaultPanForZoom(z){ return {x:(1-z)*W/2,y:(1-z)*H/2}; }\n    function resetZoom(){ state.zoom=1.08; const p=defaultPanForZoom(state.zoom); state.panX=p.x; state.panY=p.y; applyTransform(); }\n    function applyTransform(){ const vp=$('viewport'); if(vp) vp.setAttribute('transform',`translate(${state.panX.toFixed(2)} ${state.panY.toFixed(2)}) scale(${state.zoom.toFixed(3)})`); }\n    function zoomAt(f,cx=W/2,cy=H/2){ const prev=state.zoom,next=Math.max(1,Math.min(4,prev*f)),s=next/prev; state.panX=cx-s*(cx-state.panX); state.panY=cy-s*(cy-state.panY); state.zoom=next; applyTransform(); }\n    function attachInteraction(){ const svg=$('map'); if(svg.dataset.bound) return; svg.dataset.bound='1'; let dragging=false,lx=0,ly=0; svg.addEventListener('wheel',e=>{ e.preventDefault(); const rect=svg.getBoundingClientRect(); const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height); zoomAt(e.deltaY\u003c0?1.12:0.89,mx,my); },{passive:false}); svg.addEventListener('mousedown',e=>{ dragging=true; lx=e.clientX; ly=e.clientY; svg.style.cursor='grabbing'; }); window.addEventListener('mousemove',e=>{ if(!dragging) return; const rect=svg.getBoundingClientRect(); state.panX+=(e.clientX-lx)*(W/rect.width); state.panY+=(e.clientY-ly)*(H/rect.height); lx=e.clientX; ly=e.clientY; applyTransform(); }); window.addEventListener('mouseup',()=>{ dragging=false; svg.style.cursor='grab'; }); svg.addEventListener('dblclick',()=>resetZoom()); const zi=$('zoomIn'),zo=$('zoomOut'),zr=$('zoomReset'); if(zi)zi.onclick=()=>zoomAt(1.15); if(zo)zo.onclick=()=>zoomAt(0.87); if(zr)zr.onclick=()=>resetZoom(); svg.style.cursor='grab'; }\n\n    // ---- toggles / sync\n    function styleSeg(btns,isOn){ btns.forEach(b=>{ const on=isOn(b); b._on=on; b._restbg=on?'#ffffff':'transparent'; b.style.background=b._restbg; b.style.color=on?'#16191d':'#6b7280'; b.style.boxShadow=on?'0 1px 2px rgba(16,24,40,.14)':'none'; b.style.fontWeight=on?'700':'600'; }); }\n    function stylePill(btns,isOn){ btns.forEach(b=>{ const on=isOn(b); b._on=on; b._restbg=on?C.orangeSoft:'#ffffff'; b.style.background=b._restbg; b.style.color=on?C.orange:'#6b7280'; b.style.borderColor=on?'rgba(238,124,48,.45)':'#e6e8ec'; }); }\n    function addHover(btns){ btns.forEach(b=>{ b.addEventListener('mouseenter',()=>{ if(!b._on){ b.style.color='#374151'; b.style.background='#eef0f3'; } }); b.addEventListener('mouseleave',()=>{ if(!b._on){ b.style.color='#6b7280'; b.style.background=b._restbg||'transparent'; } }); }); }\n\n    function syncPanels(){ const occ=state.view==='occupancy'; $('mapPanel').style.display=occ?'none':'flex'; $('occPanel').style.display=occ?'flex':'none'; $('metricGroup').style.display=occ?'none':'flex'; $('dimrow').style.display=occ?'none':'flex'; $('mapIconBar').style.display=occ?'none':'flex'; $('defaultSidebar').style.display=occ?'none':'flex'; $('occSidebar').style.display=occ?'flex':'none'; $('mainKicker').textContent=occ?'Tőkehatékonyság · Fix díjas portfólió':'Földrajzi eloszlás · '+viewLabel(state.view); $('mainTitle').textContent=occ?'Kihasználtság & becsült bukás':'Magyarország — megyei bontás'; $('mainHint').textContent=occ?'Aktuális kapacitás, kihasználtság és a fix költségből eredő becsült veszteség, szálláshelyenként.':'Régió, cég és partner szerinti eloszlás interaktív térképen — görgess a nagyításhoz, húzd a mozgatáshoz.'; stylePill([...document.querySelectorAll('[data-occ-tab]')],b=>b.dataset.occTab===state.occTab); $('occSummary').style.display=occ&&state.occTab==='summary'?'flex':'none'; $('occDetails').style.display=occ&&state.occTab==='details'?'flex':'none'; }\n\n    function render(){ styleSeg([...document.querySelectorAll('[data-view]')],b=>b.dataset.view===state.view); stylePill([...document.querySelectorAll('[data-metric]')],b=>b.dataset.metric===state.metric); renderControls(); renderKPIs(); syncPanels(); const body=$('mainbody'); body.style.animation='none'; void body.offsetWidth; body.style.animation='riseIn .4s ease'; if(state.view==='occupancy'){ renderOccSidebar(); if(state.occTab==='summary') renderOccSummary(); else renderOccDetails(); } else { renderRank(); renderMap(); } }\n\n    // ---- init\n    $('map').setAttribute('viewBox','0 0 760 520'); $('map').setAttribute('preserveAspectRatio','xMidYMid meet');\n    $('lossChart').setAttribute('viewBox','0 0 760 360'); $('lossChart').setAttribute('preserveAspectRatio','none');\n    $('emptyChart').setAttribute('viewBox','0 0 760 300'); $('emptyChart').setAttribute('preserveAspectRatio','none');\n    [...document.querySelectorAll('[data-view]')].forEach(b=>b.onclick=()=>{ state.view=b.dataset.view; state.dim='__ALL__'; render(); });\n    [...document.querySelectorAll('[data-metric]')].forEach(b=>b.onclick=()=>{ state.metric=b.dataset.metric; render(); });\n    [...document.querySelectorAll('[data-occ-tab]')].forEach(b=>b.onclick=()=>{ state.occTab=b.dataset.occTab; render(); });\n    addHover([...document.querySelectorAll('[data-view]')]); addHover([...document.querySelectorAll('[data-metric]')]); addHover([...document.querySelectorAll('[data-occ-tab]')]);\n    const tick=()=>{ const c=$('clock'); if(!c) return; const d=new Date(); c.textContent=d.toLocaleDateString('hu-HU',{year:'numeric',month:'short',day:'numeric'})+' · '+d.toLocaleTimeString('hu-HU',{hour:'2-digit',minute:'2-digit'}); };\n    tick(); setInterval(tick,30000);\n    window.__onDashUpdate = () => { ({EMBEDDED, GEO, OCC_FIX, OCC_SUMMARY} = window.DASH); DATA = EMBEDDED; render(); };\n    resetZoom(); render();\n  }\n}\n\u003c/script>\n\n\n\u003c/body>\u003c/html>"
